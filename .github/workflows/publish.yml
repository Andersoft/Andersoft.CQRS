name: Publish NuGet Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Compute version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Computed version: $VERSION"

      - name: Restore
        run: dotnet restore src/Andersoft.CQRS

      - name: Build
        run: dotnet build src/Andersoft.CQRS --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Andersoft.CQRS --configuration Release --no-build --output ./nupkgs -p:Version=${{ env.VERSION }}

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./nupkgs/Andersoft.CQRS.*.nupkg
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
